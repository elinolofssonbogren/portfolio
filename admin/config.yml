backend:
  name: git-gateway
  branch: main # Ändra till master om din branch heter det på GitHub

media_folder: "images"
public_folder: "/images"

collections:
  # 1. Statiska sidor (Startsidan)
  - name: "pages"
    label: "Sidor"
    files:
      - file: "content/index.json"
        label: "Startsida (Text)"
        name: "index"
        fields:
          - { label: "Rubrik", name: "title", widget: "string" }
          - { label: "Undertext", name: "subtitle", widget: "string" }
          - { label: "Handskriven intro", name: "intro", widget: "string" }

  # 2. Dina egna projekt
  - name: "projects"
    label: "Projekt"
    folder: "content/projects"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Titel", name: "title", widget: "string" }
      - { label: "Kategori/Tagg", name: "category", widget: "string", default: "KONCEPT" }
      - { label: "År", name: "year", widget: "string", default: "2026" }
      - { label: "Projektbild", name: "image", widget: "image" }
      - { label: "Beskrivning", name: "description", widget: "text", required: false }
      - { label: "Länk (Valfri)", name: "link", widget: "string", required: false }

  # 3. Media & Inspiration (YouTube, böcker, poddar m.m.)
  - name: "media"
    label: "Media & Inspiration"
    folder: "content/media"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Titel / Namn", name: "title", widget: "string" }
      - label: "Typ av media"
        name: "type"
        widget: "select"
        options: ["YouTube", "Bok", "Artikel", "Podd", "Film/Serie"]
      - { label: "Skapare / Författare", name: "creator", widget: "string", required: false }
      - { label: "Länk (Valfri)", name: "link", widget: "string", required: false }
      - { label: "Omslag/Bild (Valfri)", name: "image", widget: "image", required: false }
      - { label: "Mina tankar / Betyg", name: "review", widget: "text", required: false }
      - { label: "Datum tillagt", name: "date", widget: "datetime", format: "YYYY-MM-DD" }
