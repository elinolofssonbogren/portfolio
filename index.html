<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elin Olofsson Bogren — Portfolio</title>
    
    <meta name="description" content="Elin Olofsson Bogren — Portfolio inom design, teknik och kreativ problemlösning.">
    <meta name="author" content="Elin Olofsson Bogren">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://din-doman.netlify.app/">
    <meta property="og:title" content="Elin Olofsson Bogren — Portfolio">
    <meta property="og:description" content="Kika in i mitt digitala arkiv av design, kod och inspiration.">
    <meta property="og:image" content="https://picsum.photos/1200/630">
    <meta name="twitter:card" content="summary_large_image">

    <link rel="icon" href="favicon.png" type="image/png">

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Sätter rätt tema direkt, innan resten av sidan hinner rendera, så det inte "blinkar" till fel läge -->
    <script>
      if (localStorage.getItem("tema") === "dark") {
        document.body.classList.add("dark-mode");
      }
    </script>

    <nav class="top-nav">
        <div class="nav-left">
            <a href="index.html" class="logo-link">ELIN OLOFSSON BOGREN</a>
            <span class="location">STOCKHOLM, SE</span>
        </div>
        <div class="nav-right">
            <a href="index.html" class="nav-link active">HEM</a>
            <a href="cv.html" class="nav-link">CV</a>
            <button id="theme-toggle" onclick="skiftaTema()">TEMA</button>
        </div>
    </nav>

    <header class="hero-scrapbook">
        <h1>ARKIV BEO</h1>
        <p class="hero-subtext">Ett Digitalt Arikv</p>
    </header>

    <main>
        <section class="asymmetric-section">
            <div class="section-label">
                <span>(01)</span>
                <h2>UTVALT ARKIV</h2>
            </div>
            <div class="section-content">
                <div class="portfolio-grid">
                    <article class="project-item">
                        <div class="project-img-wrapper">
                            <img src="https://picsum.photos/700/500?random=1" alt="Projekt 1">
                        </div>
                        <div class="project-meta">
                            <h3>Visuell Identitet</h3>
                            <span>2026</span>
                        </div>
                    </article>

                    <article class="project-item">
                        <div class="project-img-wrapper">
                            <img src="https://picsum.photos/700/500?random=2" alt="Projekt 2">
                        </div>
                        <div class="project-meta">
                            <h3>arkiv.beo</h3>
                            <span>KONCEPT</span>
                        </div>
                    </article>
                </div>
            </div>
        </section>

        <section class="asymmetric-section">
            <div class="section-label">
                <span>(02)</span>
                <h2>ANSLAGSTAVLA</h2>
            </div>
            <div class="section-content">
                <form id="guestbook-form" onsubmit="skickaKommentar(event, null)">
                    <input type="text" id="guest-name" class="comment-name-input" placeholder="Ditt namn (valfritt)">
                    <input type="text" id="guest-input" class="comment-text-input" placeholder="Lämna en tanke..." required>
                    <button type="submit">SKICKA</button>
                </form>
                <div id="notes-container" class="notes-container">
                    </div>
            </div>
        </section>

        <section class="asymmetric-section">
            <div class="section-label">
                <span>(03)</span>
                <h2>MEDIA & INSPIRATION</h2>
            </div>
            
            <div id="media-filter" class="filter-container">
                <button class="filter-btn active" onclick="filtreraMedia(event,'alla')">ALLT</button>
                <button class="filter-btn" onclick="filtreraMedia(event,'bok')">BÖCKER</button>
                <button class="filter-btn" onclick="filtreraMedia(event,'podd')">PODDAR</button>
                <button class="filter-btn" onclick="filtreraMedia(event,'film')">FILM/VIDEO</button>
            </div>

            <div class="section-content">
                <div id="media-grid" class="media-grid"></div>
            </div>
        </section>

        <section class="contact-block">
            <span>(04) KONTAKT</span>
            <h2>Låt oss skapa något.</h2>
            
            <div class="contact-actions">
                <a href="https://instagram.com/arkiv.beo" target="_blank" rel="noopener noreferrer" class="insta-pill">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
                        <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
                        <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
                    </svg>
                    @arkiv.beo
                </a>
                <a href="mailto:elinbogren@icloud.com" class="email-btn">
                    elinbogren@icloud.com
                </a>
            </div>
        </section>
    </main>

    <footer>
        ELIN OLOFSSON BOGREN DESIGN, KOD &amp; TEKNIK
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <script>
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", user => {
          if (!user) {
            window.netlifyIdentity.on("login", () => {
              document.location.href = "/admin/";
            });
          }
        });
      }
    </script>
</body>
</html>
